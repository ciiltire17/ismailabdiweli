      function useTyping(words) {
        const [index, setIndex] = useState(0);
        const [subIndex, setSubIndex] = useState(0);
        const [deleting, setDeleting] = useState(false);

        useEffect(() => {
          const word = words[index];
          const delay = deleting ? 36 : 72;
          const pause = subIndex === word.length && !deleting ? 1200 : delay;
          const timer = setTimeout(() => {
            if (!deleting && subIndex < word.length) setSubIndex(subIndex + 1);
            else if (!deleting && subIndex === word.length) setDeleting(true);
            else if (deleting && subIndex > 0) setSubIndex(subIndex - 1);
            else {
              setDeleting(false);
              setIndex((index + 1) % words.length);
            }
          }, pause);
          return () => clearTimeout(timer);
        }, [words, index, subIndex, deleting]);

        return words[index].slice(0, subIndex);
